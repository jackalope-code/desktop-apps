name: filemon

on:
  push:
    paths:
      - 'filemon/**'
      - '.github/workflows/filemon.yml'
    tags:
      - 'filemon-v*'
  pull_request:
    paths:
      - 'filemon/**'
      - '.github/workflows/filemon.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: filemon
            artifact: filemon-linux-x86_64
          - os: windows-latest
            bin: filemon.exe
            artifact: filemon-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: filemon

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: filemon -> target

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --all

      - name: Stage artifact
        shell: bash
        run: cp target/release/${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: filemon/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/filemon-v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: filemon ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
