name: filemon

on:
  push:
    paths:
      - 'filemon/**'
      - '.github/workflows/filemon.yml'
  pull_request:
    paths:
      - 'filemon/**'
      - '.github/workflows/filemon.yml'

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: filemon

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: filemon -> target

      - name: Build
        run: cargo build --all

      - name: Test
        run: cargo test --all
