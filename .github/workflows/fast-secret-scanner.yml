name: fast-secret-scanner

on:
  push:
    paths:
      - 'fast-secret-scanner/**'
      - '.github/workflows/fast-secret-scanner.yml'
  pull_request:
    paths:
      - 'fast-secret-scanner/**'
      - '.github/workflows/fast-secret-scanner.yml'

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: fast-secret-scanner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fast-secret-scanner -> target

      - name: Install Linux dependencies (openssl for git2)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --all

      - name: Test
        run: cargo test --all
