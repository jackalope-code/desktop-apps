name: fast-secret-scanner

on:
  push:
    paths:
      - 'fast-secret-scanner/**'
      - '.github/workflows/fast-secret-scanner.yml'
    tags:
      - 'fss-v*'
  pull_request:
    paths:
      - 'fast-secret-scanner/**'
      - '.github/workflows/fast-secret-scanner.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: fss
            artifact: fss-linux-x86_64
          - os: windows-latest
            bin: fss.exe
            artifact: fss-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: fast-secret-scanner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fast-secret-scanner -> target

      - name: Install Linux dependencies (openssl for git2)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --all

      - name: Stage artifact
        shell: bash
        run: cp target/release/${{ matrix.bin }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: fast-secret-scanner/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/fss-v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: fss ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
