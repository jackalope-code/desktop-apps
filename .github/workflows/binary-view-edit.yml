name: binary-view-edit

on:
  push:
    paths:
      - 'binary-view-edit/**'
      - '.github/workflows/binary-view-edit.yml'
    tags:
      - 'binrw-v*'
  pull_request:
    paths:
      - 'binary-view-edit/**'
      - '.github/workflows/binary-view-edit.yml'
  workflow_dispatch:

jobs:
  binrw-cli:
    name: binrw-cli (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: binrw-cli
            artifact: binrw-cli-linux-x86_64
          - os: windows-latest
            bin: binrw-cli.exe
            artifact: binrw-cli-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: binary-view-edit/binrw-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: binary-view-edit/binrw-cli -> target
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test --all
      - name: Stage artifact
        shell: bash
        run: cp target/release/${{ matrix.bin }} ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: binary-view-edit/binrw-cli/${{ matrix.artifact }}
          if-no-files-found: error

  tauri:
    name: tauri (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: binary-view-edit/client
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: binary-view-edit/client/src-tauri -> target
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: binary-view-edit/client/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run tauri build
      - name: Upload bundles (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: binrw-tauri-linux
          path: |
            binary-view-edit/client/src-tauri/target/release/bundle/deb/*.deb
            binary-view-edit/client/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
      - name: Upload bundles (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binrw-tauri-windows
          path: |
            binary-view-edit/client/src-tauri/target/release/bundle/msi/*.msi
            binary-view-edit/client/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: [binrw-cli, tauri]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/binrw-v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: BinRW ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
