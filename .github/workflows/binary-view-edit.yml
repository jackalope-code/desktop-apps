name: binary-view-edit

on:
  push:
    paths:
      - 'binary-view-edit/**'
      - '.github/workflows/binary-view-edit.yml'
  pull_request:
    paths:
      - 'binary-view-edit/**'
      - '.github/workflows/binary-view-edit.yml'

jobs:
  # ── binrw-cli (pure Rust) ──────────────────────────────────────────────────
  binrw-cli:
    name: binrw-cli build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: binary-view-edit/binrw-cli

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: binary-view-edit/binrw-cli -> target

      - name: Build
        run: cargo build --all

      - name: Test
        run: cargo test --all

  # ── Tauri desktop app (React + Rust) ──────────────────────────────────────
  tauri:
    name: tauri build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: binary-view-edit/client

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: binary-view-edit/client/src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: binary-view-edit/client/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
